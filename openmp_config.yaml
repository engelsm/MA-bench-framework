global:
  project_name: "MyBenchmarkProject"
  num_cores: 32
  numa_policy: interleave
  max_memory_mb: 819200
  compiler_flags: ["-O2", "-g", "-fopenmp"]
  perf_counters: [
        "cycles", "instructions", "branches", "branch-misses",
        "cache-references", "cache-misses",
        "dTLB-loads", "dTLB-load-misses",
        "iTLB-loads", "iTLB-load-misses",
        "page-faults", "context-switches", "cpu-migrations", "task-clock"
  ]

benchmarks:
  - source: workloads/sparse_csr.c
    args: ["workloads/matrices/bcsstk13.mtx"]
    runs: 10
    warmup_runs: 2
  - source: workloads/sparse_csr_single_thread.c
    args: ["workloads/matrices/bcsstk13.mtx"]
    runs: 10  
    warmup_runs: 2