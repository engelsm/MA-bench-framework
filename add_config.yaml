global:
  project_name: "MyBenchmarkProject"
  num_cores: 8
  numa_policy: local
  max_memory_mb: 8192
  compiler_flags: ["-O2", "-g","-lm"]
  perf_counters: [
        "cycles", "instructions", "branches", "branch-misses",
        "cache-references", "cache-misses",
        "dTLB-loads", "dTLB-load-misses",
        "iTLB-loads", "iTLB-load-misses",
        "page-faults", "context-switches", "cpu-migrations", "task-clock"
  ]

benchmarks:
  - source: workloads/add_single_thread.c
    runs: 10
    warmup_runs: 2
  - source: workloads/add_multi_thread.c
    runs: 10  
    warmup_runs: 2
    compiler_flags: ["-O2", "-g","ffast-math","-fopenmp"]